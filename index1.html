<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8" />

<title>Clock</title>

<style>

  html, body {

    margin: 0;

    height: 100%;

    overflow: hidden;

    background: black;

  }

  canvas { display: block; }

  #ui {

    position: fixed;

    top: 10px;

    left: 10px;

    z-index: 10;

  }

  #dim {

    position: absolute;

    inset: 0;

    background: black;

    opacity: 0;

    transition: opacity 1.5s ease;

    pointer-events: none;

  }

</style>

</head>

<body>

<div id="ui">

  <input type="color" id="colorPicker" value="#ffffff">

</div>

<canvas id="c"></canvas>

<div id="dim"></div>

<script>

const canvas = document.getElementById("c");

const ctx = canvas.getContext("2d");

const dim = document.getElementById("dim");

const picker = document.getElementById("colorPicker");

let color = picker.value;

picker.addEventListener("input", e => color = e.target.value);

function resize() {

  canvas.width = window.innerWidth;

  canvas.height = window.innerHeight;

}

window.addEventListener("resize", resize);

resize();

function draw() {

  ctx.fillStyle = "black";

  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const now = new Date();

  const time = now.toLocaleTimeString();

  ctx.fillStyle = color;

  ctx.font = "80px Arial";

  ctx.textAlign = "center";

  ctx.textBaseline = "middle";

  ctx.fillText(time, canvas.width/2, canvas.height/2);

  requestAnimationFrame(draw);

}

draw();

let timer;

function reset() {

  dim.style.opacity = 0;

  clearTimeout(timer);

  timer = setTimeout(() => {

    dim.style.opacity = 0.9;

  }, 5000);

}

["mousemove","keydown","touchstart"].forEach(e =>

  window.addEventListener(e, reset)

);

reset();

</script>

</body>

</html>
