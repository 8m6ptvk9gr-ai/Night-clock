<!DOCTYPE html>

<html>

<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Night Clock</title>

  <style>

    html, body {

      margin: 0;

      height: 100%;

      background: #000;

      overflow: hidden;

      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", Arial, sans-serif;

    }

    body {

      display: flex;

      justify-content: center;

      align-items: center;

      transition: background 1s ease;

    }

    /* StandBy-style layout */

    .container {

      text-align: center;

      transform: translateY(-2vh);

    }

    #clock {

      font-size: clamp(90px, 18vw, 180px);

      font-weight: 300;

      letter-spacing: 0.02em;

      color: #00ffcc;

      text-shadow: 0 0 18px rgba(0, 255, 204, 0.35);

      transition: all 0.5s ease;

    }

    .controls {

      margin-top: 30px;

      display: flex;

      flex-direction: column;

      gap: 12px;

      color: white;

      font-size: 13px;

      opacity: 1;

      transition: opacity 0.6s ease;

      align-items: center;

    }

    /* Hidden controls (StandBy feel) */

    .hidden {

      opacity: 0;

      pointer-events: none;

    }

    input[type="range"] {

      width: 220px;

      accent-color: #00ffcc;

    }

    input[type="color"] {

      width: 60px;

      height: 34px;

      border: none;

      background: none;

    }

    label {

      opacity: 0.7;

    }

    /* Dim mode */

    .dim #clock {

     opacity: 0.08;

  filter: saturate(60%)

    }

    .dim {

      background: #000;

    }

  </style>

</head>

<body>

  <div class="container">

    <div id="clock"></div>

    <div class="controls">

      <label>Colour</label>

      <input type="color" id="colorPicker" value="#00ffcc">

      <label>Brightness</label>

      <input type="range" id="brightness" min="0.1" max="1" step="0.05" value="1">

    </div>

  </div>

  <script>

    const clock = document.getElementById("clock");

    const colorPicker = document.getElementById("colorPicker");

    const brightness = document.getElementById("brightness");

    const controls = document.querySelector(".controls");

    const body = document.body;

    let hideTimeout;

    let dimTimeout;

    function updateClock() {

      const now = new Date();

      const h = String(now.getHours()).padStart(2, "0");

      const m = String(now.getMinutes()).padStart(2, "0");

      clock.textContent = `${h}:${m}`;

    }

    function updateStyle() {

      const color = colorPicker.value;

      const bright = brightness.value;

      clock.style.color = color;

      clock.style.textShadow = `0 0 18px ${color}`;

      clock.style.opacity = bright;

    }

    // StandBy-style control reveal

    function showControls() {

      controls.classList.remove("hidden");

      clearTimeout(hideTimeout);

      hideTimeout = setTimeout(() => {

        controls.classList.add("hidden");

      }, 2500);

    }

    // Dim after inactivity

    function resetDimTimer() {

      body.classList.remove("dim");

      clearTimeout(dimTimeout);

      dimTimeout = setTimeout(() => {

        body.classList.add("dim");

      }, 20000);

    }

    function interaction() {

      showControls();

      resetDimTimer();

    }

    // iPad-safe input handling

    document.addEventListener("pointerdown", interaction, { passive: true });

    document.addEventListener("touchstart", interaction, { passive: true });

    colorPicker.addEventListener("input", updateStyle);

    brightness.addEventListener("input", updateStyle);

    // init

    setInterval(updateClock, 1000);

    updateClock();

    updateStyle();

    showControls();

    resetDimTimer();

  </script>

</body>

</html>
