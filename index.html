<script>

document.addEventListener("DOMContentLoaded", () => {

  const clock = document.getElementById("clock");

  const colorPicker = document.getElementById("colorPicker");

  const brightness = document.getElementById("brightness");

  const controls = document.querySelector(".controls");

  if (!clock || !colorPicker || !brightness || !controls) {

    console.error("Missing required elements in HTML");

    return;

  }

  let dimTimeout;

  let hideTimeout;

  function updateClock() {

    const now = new Date();

    const h = String(now.getHours()).padStart(2, "0");

    const m = String(now.getMinutes()).padStart(2, "0");

    clock.textContent = `${h}:${m}`;

  }

  function updateStyle() {

    const color = colorPicker.value;

    const bright = brightness.value;

    clock.style.color = color;

    clock.style.textShadow = `0 0 25px ${color}`;

    clock.style.opacity = bright;

  }

  function showControls() {

    controls.classList.remove("hidden");

    clearTimeout(hideTimeout);

    hideTimeout = setTimeout(() => {

      controls.classList.add("hidden");

    }, 2500);

  }

  function resetDimTimer() {

    document.body.classList.remove("dim");

    clearTimeout(dimTimeout);

    dimTimeout = setTimeout(() => {

      document.body.classList.add("dim");

    }, 5000);

  }

  function interact() {

    showControls();

    resetDimTimer();

  }

  document.addEventListener("pointerdown", interact, { passive: true });

  document.addEventListener("touchstart", interact, { passive: true });

  colorPicker.addEventListener("input", updateStyle);

  brightness.addEventListener("input", updateStyle);

  setInterval(updateClock, 1000);

  updateClock();

  updateStyle();

  showControls();

  resetDimTimer();

});

</script>
