<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8" />

<title>Neon Moving Clock</title>

<style>

html, body {

  margin: 0;

  height: 100%;

  overflow: hidden;

  background: black;

}

canvas {

  display: block;

}

/* UI */

#ui {

  position: fixed;

  top: 10px;

  left: 10px;

  z-index: 10;

}

/* Dim overlay */

#dim {

  position: absolute;

  inset: 0;

  background: black;

  opacity: 0;

  transition: opacity 1.5s ease;

  pointer-events: none;

}

</style>

</head>

<body>

<div id="ui">

  <input type="color" id="colorPicker" value="#00ffff">

</div>

<canvas id="c"></canvas>

<div id="dim"></div>

<script>

const canvas = document.getElementById("c");

const ctx = canvas.getContext("2d");

const dim = document.getElementById("dim");

const picker = document.getElementById("colorPicker");

let color = picker.value;

picker.addEventListener("input", e => color = e.target.value);

function resize() {

  canvas.width = window.innerWidth;

  canvas.height = window.innerHeight;

}

window.addEventListener("resize", resize);

resize();

/* ---------------- MOVING CLOCK ---------------- */

let x = 200;

let y = 200;

let vx = 2.5;

let vy = 2;

function drawGlowText(text, x, y, color) {

  ctx.shadowColor = color;

  ctx.shadowBlur = 25;

  ctx.fillStyle = color;

  ctx.fillText(text, x, y);

  ctx.shadowBlur = 0;

}

function animate() {

  ctx.fillStyle = "black";

  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const time = new Date().toLocaleTimeString();

  ctx.font = "80px Arial";

  ctx.textAlign = "left";

  ctx.textBaseline = "top";

  // glow neon effect

  drawGlowText(time, x, y, color);

  const width = ctx.measureText(time).width;

  const height = 80;

  x += vx;

  y += vy;

  if (x + width > canvas.width || x < 0) vx *= -1;

  if (y + height > canvas.height || y < 0) vy *= -1;

  requestAnimationFrame(animate);

}

animate();

/* ---------------- DIM AFTER 5 SECONDS ---------------- */

let timer;

function resetIdle() {

  dim.style.opacity = 0;

  clearTimeout(timer);

  timer = setTimeout(() => {

    dim.style.opacity = 0.9;

  }, 5000);

}

["mousemove","keydown","touchstart"].forEach(e =>

  window.addEventListener(e, resetIdle)

);

resetIdle();

</script>

</body>

</html>
