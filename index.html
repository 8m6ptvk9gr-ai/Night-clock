<!DOCTYPE html>

<html>

<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Night Clock</title>

  <style>

    body {

      margin: 0;

      height: 100vh;

      display: flex;

      justify-content: center;

      align-items: center;

      background: black;

      font-family: Arial, sans-serif;

      overflow: hidden;

    }

    .container {

      text-align: center;

    }

    #clock {

      font-size: 140px;

      color: #00ffcc;

      text-shadow: 0 0 25px #00ffcc;

      margin-bottom: 40px;

    }

    .controls {

      display: flex;

      flex-direction: column;

      gap: 10px;

      color: white;

      font-size: 14px;

    }

    input[type="range"] {

      width: 200px;

    }

  </style>

</head>

<body>

  <div class="container">

    <div id="clock"></div>

    <div class="controls">

      <label>Glow colour</label>

      <input type="color" id="colorPicker" value="#00ffcc">

      <label>Brightness</label>

      <input type="range" id="brightness" min="0.2" max="1" step="0.05" value="1">

    </div>

  </div>

  <script>

    const clock = document.getElementById("clock");

    const colorPicker = document.getElementById("colorPicker");

    const brightness = document.getElementById("brightness");

    function updateClock() {

      const now = new Date();

      const h = String(now.getHours()).padStart(2, "0");

      const m = String(now.getMinutes()).padStart(2, "0");

      clock.textContent = `${h}:${m}`;

    }

    function updateStyle() {

      const color = colorPicker.value;

      const bright = brightness.value;

      clock.style.color = color;

      clock.style.textShadow = `0 0 25px ${color}`;

      clock.style.opacity = bright;

    }

    colorPicker.addEventListener("input", updateStyle);

    brightness.addEventListener("input", updateStyle);

    setInterval(updateClock, 1000);

    updateClock();

    updateStyle();

  </script>

</body>

</html>
