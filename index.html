<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Night Clock</title>

<style>

html, body{

    margin:0;

    width:100%;

    height:100%;

    overflow:hidden;

    background:black;

    font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;

}

body{

    display:flex;

    justify-content:center;

    align-items:center;

    transition:opacity 1s;

}

.container{

    text-align:center;

}

#clock{

    font-size:min(28vw,180px);

    font-weight:200;

    color:#00ffcc;

    text-shadow:0 0 25px #00ffcc;

    transition:opacity 1s,text-shadow 1s,color .5s;

}

.controls{

    margin-top:40px;

    color:white;

    transition:opacity .6s;

}

.hidden{

    opacity:0;

    pointer-events:none;

}

input[type=range]{

    width:220px;

}

</style>

</head>

<body>

<div class="container">

<div id="clock"></div>

<div class="controls">

<p>Colour</p>

<input

type="color"

id="colorPicker"

value="#00ffcc">

<p>Brightness</p>

<input

type="range"

id="brightness"

min="0.2"

max="1"

step="0.05"

value="1">

</div>

</div>

<script>

const clock=document.getElementById("clock");

const colour=document.getElementById("colorPicker");

const brightness=document.getElementById("brightness");

const controls=document.querySelector(".controls");

let hideTimer;

let dimTimer;

function updateClock(){

const now=new Date();

const h=String(now.getHours()).padStart(2,"0");

const m=String(now.getMinutes()).padStart(2,"0");

clock.textContent=`${h}:${m}`;

}

function applyStyle(){

clock.style.color=colour.value;

clock.style.textShadow=`0 0 25px ${colour.value}`;

clock.style.opacity=brightness.value;

}

function showControls(){

controls.classList.remove("hidden");

clearTimeout(hideTimer);

hideTimer=setTimeout(()=>{

controls.classList.add("hidden");

},2500);

}

function dimClock(){

clock.style.opacity=0.18;

}

function wakeClock(){

applyStyle();

showControls();

clearTimeout(dimTimer);

dimTimer=setTimeout(dimClock,5000);

}

colour.addEventListener("input",applyStyle);

brightness.addEventListener("input",applyStyle);

document.addEventListener("pointerdown",wakeClock);

setInterval(updateClock,1000);

updateClock();

applyStyle();

wakeClock();

</script>

</body>

</html>
