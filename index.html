<script>

const clock = document.getElementById("clock");

const colorPicker = document.getElementById("colorPicker");

const brightness = document.getElementById("brightness");

const controls = document.querySelector(".controls");

const body = document.body;

let dimTimeout = null;

let hideTimeout = null;

// Clock update

function updateClock() {

  const now = new Date();

  const h = String(now.getHours()).padStart(2, "0");

  const m = String(now.getMinutes()).padStart(2, "0");

  clock.textContent = `${h}:${m}`;

}

// Neon style update

function updateStyle() {

  const color = colorPicker.value;

  const bright = brightness.value;

  clock.style.color = color;

  clock.style.textShadow = `0 0 25px ${color}`;

  clock.style.opacity = bright;

}

// Show controls briefly

function showControls() {

  controls.classList.remove("hidden");

  clearTimeout(hideTimeout);

  hideTimeout = setTimeout(() => {

    controls.classList.add("hidden");

  }, 2500);

}

// Dim quickly after 5 seconds of no interaction

function resetDimTimer() {

  body.classList.remove("dim");

  clearTimeout(dimTimeout);

  dimTimeout = setTimeout(() => {

    body.classList.add("dim");

  }, 5000); // 👈 YOUR REQUEST: 5 seconds

}

// Single interaction handler

function onInteraction() {

  showControls();

  resetDimTimer();

}

// iPad-safe input handling

document.addEventListener("pointerdown", onInteraction, { passive: true });

document.addEventListener("touchstart", onInteraction, { passive: true });

// UI inputs

colorPicker.addEventListener("input", updateStyle);

brightness.addEventListener("input", updateStyle);

// Init

setInterval(updateClock, 1000);

updateClock();

updateStyle();

showControls();

resetDimTimer();

</script>
