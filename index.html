<script>

const clock = document.getElementById("clock");

const colorPicker = document.getElementById("colorPicker");

const brightness = document.getElementById("brightness");

const controls = document.querySelector(".controls");

const body = document.body;

let hideTimeout;

let dimTimeout;

function updateClock() {

  const now = new Date();

  const h = String(now.getHours()).padStart(2, "0");

  const m = String(now.getMinutes()).padStart(2, "0");

  clock.textContent = `${h}:${m}`;

}

function updateStyle() {

  const color = colorPicker.value;

  const bright = brightness.value;

  clock.style.color = color;

  clock.style.textShadow = `0 0 25px ${color}`;

  clock.style.opacity = bright;

}

// Show controls temporarily

function showControls() {

  controls.classList.remove("hidden");

  clearTimeout(hideTimeout);

  hideTimeout = setTimeout(() => {

    controls.classList.add("hidden");

  }, 2500);

}

// Dim screen after inactivity

function resetDimTimer() {

  body.classList.remove("dim");

  clearTimeout(dimTimeout);

  dimTimeout = setTimeout(() => {

    body.classList.add("dim");

  }, 20000); // 20 seconds

}

// Unified interaction handler (IMPORTANT FIX)

function userInteraction() {

  showControls();

  resetDimTimer();

}

// Use pointer events (works for touch + mouse + Apple Pencil)

document.addEventListener("pointerdown", userInteraction);

document.addEventListener("touchstart", userInteraction);

colorPicker.addEventListener("input", updateStyle);

brightness.addEventListener("input", updateStyle);

// Init

setInterval(updateClock, 1000);

updateClock();

updateStyle();

showControls();

resetDimTimer();

</script>
