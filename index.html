<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8" />

<title>Dim Screensaver</title>

<style>

  html, body {

    margin: 0;

    height: 100%;

    overflow: hidden;

    background: black;

  }

  canvas {

    display: block;

  }

  /* 🔴 dim overlay */

  #dim {

    position: absolute;

    top: 0;

    left: 0;

    width: 100%;

    height: 100%;

    background: black;

    opacity: 0;

    transition: opacity 1.5s ease;

    pointer-events: none;

  }

</style>

</head>

<body>

<canvas id="screen"></canvas>

<div id="dim"></div>

<script>

const canvas = document.getElementById("screen");

const ctx = canvas.getContext("2d");

const dim = document.getElementById("dim");

function resize() {

  canvas.width = window.innerWidth;

  canvas.height = window.innerHeight;

}

window.addEventListener("resize", resize);

resize();

const message = "SCREENSAVER TEXT";

const words = message.split(" ").map(word => ({

  text: word,

  x: Math.random() * window.innerWidth,

  y: Math.random() * window.innerHeight,

  vx: (Math.random() - 0.5) * 2,

  vy: (Math.random() - 0.5) * 2,

  size: 30 + Math.random() * 20

}));

function draw() {

  ctx.fillStyle = "black";

  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "white";

  for (let w of words) {

    ctx.font = `${w.size}px Arial`;

    ctx.fillText(w.text, w.x, w.y);

    w.x += w.vx;

    w.y += w.vy;

    if (w.x < 0 || w.x > canvas.width - 150) w.vx *= -1;

    if (w.y < 30 || w.y > canvas.height) w.vy *= -1;

  }

  requestAnimationFrame(draw);

}

draw();

// ⏱️ idle dim logic

let idleTimer;

function resetIdle() {

  dim.style.opacity = 0; // bright again

  clearTimeout(idleTimer);

  idleTimer = setTimeout(() => {

    dim.style.opacity = 0.85; // 🔥 DIM SCREEN AFTER 5s

  }, 5000);

}

// user activity resets timer

["mousemove", "mousedown", "touchstart", "keydown"].forEach(evt => {

  window.addEventListener(evt, resetIdle);

});

// start timer immediately

resetIdle();

</script>

</body>

</html
